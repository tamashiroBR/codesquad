    name: "Sofia Spec"
    gender: "female"
    icon: "📋"
    custom: agents/spec-writer.custom.md

  - id: architect
    name: "Artur Arquiteto"
    gender: "male"
    icon: "🧠"
    custom: agents/architect.custom.md

  - id: coder
    name: "Caio Código"
    gender: "male"
    icon: "⌨️"
    custom: agents/coder.custom.md

  - id: tester
